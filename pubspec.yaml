name: showroom_app

description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  intl: ^0.20.2
  uuid: ^4.5.3
  url_launcher: ^6.3.0
  path_provider: ^2.0.15
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  http: ^1.1.0
  dio: ^5.3.0
  pdf: ^3.10.7
  printing: ^5.12.0
  share_plus: ^13.1.0
  permission_handler: ^12.0.1
  flutter_phone_direct_caller: ^2.2.1
  phone_state: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/appLogo/applogo.png"
  adaptive_icon_background: "#FFFFFF"

flutter_native_splash:
  color: "#7B1F3F"
